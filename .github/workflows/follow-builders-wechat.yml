name: Follow Builders 企业微信日报

on:
  schedule:
    # 北京时间（CST, UTC+8）每工作日上午 9:00
    # 对应 UTC 时间 01:00
    - cron: '0 1 * * 1-5'
  workflow_dispatch: # 允许手动触发，方便测试

jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout 本仓库
        uses: actions/checkout@v4

      - name: Checkout follow-builders 脚本
        uses: actions/checkout@v4
        with:
          repository: zarazhangrui/follow-builders
          path: follow-builders

      - name: 配置 Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装 follow-builders 依赖
        run: |
          cd follow-builders/scripts
          npm install

      - name: 抓取资讯并推送到企业微信
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
        run: |
          cd follow-builders/scripts
          node prepare-digest.js 2>/dev/null | node $GITHUB_WORKSPACE/deliver-wechat.js
