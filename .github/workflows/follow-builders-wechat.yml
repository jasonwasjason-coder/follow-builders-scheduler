name: Follow Builders 企业微信日报

on:
  schedule:
    - cron: '0 1 * * 1-5'
  workflow_dispatch:

jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      models: read

    steps:
      - name: Checkout 本仓库
        uses: actions/checkout@v4

      - name: Checkout follow-builders 脚本
        uses: actions/checkout@v4
        with:
          repository: zarazhangrui/follow-builders
          path: follow-builders

      - name: 配置 Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装 follow-builders 依赖
        run: |
          cd follow-builders/scripts
          npm install

      - name: 抓取资讯并推送到企业微信
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
        run: |
          cd follow-builders/scripts
          node prepare-digest.js 2>/dev/null | node $GITHUB_WORKSPACE/deliver-wechat.js
